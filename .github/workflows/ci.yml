name: Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

# Cancel outdated workflow runs for the same branch or PR to conserve runner quota
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Restrict permissions to read-only for security best practices
permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  # Force clippy and build to treat warnings as errors to maintain code quality
  RUSTFLAGS: "-D warnings"

jobs:
  # ---------------------------------------------------------------------------
  # 1. Formatting Check (Fast & Platform-Independent)
  # ---------------------------------------------------------------------------
  fmt:
    name: Rustfmt Style Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: rustfmt

      - name: Check Formatting
        run: cargo fmt --all -- --check

  # ---------------------------------------------------------------------------
  # 2. Windows CI Pipeline (Clippy, Test & Release Build)
  #    Consolidated into a single Windows runner to eliminate redundant VM
  #    bootstrapping and Vulkan SDK setup overhead. Uses Swatinem/rust-cache for
  #    optimal dependency build caching.
  # ---------------------------------------------------------------------------
  windows-ci:
    name: Windows CI Pipeline (Clippy, Test, Build)
    runs-on: windows-latest
    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Install Rust Toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.97.1
          components: clippy

      - name: Rust Dependency Cache
        uses: Swatinem/rust-cache@v2
        with:
          prefix-key: "v1-rust"

      - name: Install Vulkan SDK
        uses: jakoch/install-vulkan-sdk-action@v1
        with:
          vulkan_version: 1.4.350.0
          cache: false

      - name: Run Clippy Lints
        run: cargo clippy --workspace --all-targets

      - name: Run Unit & Integration Tests
        run: cargo test --workspace --all-targets

      - name: Build Release Binaries
        run: cargo build --workspace --release

      - name: Upload Binaries Artifact
        uses: actions/upload-artifact@v4
        with:
          name: aura-windows-x64-binaries
          path: |
            target/release/wallpaperd.exe
            target/release/wallpaper-ui.exe
            target/release/workerw-proof.exe
          if-no-files-found: error
